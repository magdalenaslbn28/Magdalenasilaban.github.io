<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBSITE MAGDALENA SILABAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>WEBSITE MAGDALENA SILABAN</h1>
</header>

<!-- BAGIAN ATAS -->
<section class="top">

    <div class="photo">
        <img src="fotoprofil.jpg" alt="Foto Saya">
    </div>

    <div class="side-info">

        <div class="about-top">
            <h2>About Me</h2>
            <p>
                Halo! Saya suka belajar hal baru dan tertarik dengan dunia IT 
                serta pengembangan website.
            </p>
        </div>

        <div class="findme">
            <h3>Find Me</h3>
            <a href="https://instagram.com/kekeyihae" target="_blank" class="ig-btn">
                Instagram
            </a>
        </div>

    </div>

</section>

<hr>

<!-- BAGIAN BAWAH -->
<section class="main">

    <div class="foto-table-wrapper">

        <!-- TABLE (KIRI) -->
        <table>
            <tr>
                <th>Nama</th>
                <td>Magdalena</td>
            </tr>
            <tr>
                <th>TTL</th>
                <td>Batam, 28 Agustus</td>
            </tr>
            <tr>
                <th>Usia</th>
                <td>17 Tahun</td>
            </tr>
            <tr>
                <th>Alamat</th>
                <td>Batam</td>
            </tr>
            <tr>
                <th>Agama</th>
                <td>Katolik</td>
            </tr>
            <tr>
                <th>Hobi</th>
                <td>Cooking</td>
            </tr>
        </table>

        <!-- FOTO (KANAN) -->
        <img src="foto2.jpg" alt="Foto Tambahan" class="foto-table">

    </div>

    <!-- FAVORITE SONG (DI BAWAHNYA) -->
    <div class="bottom-content">

        <button class="pink-btn" onclick="toggleSong()">🎵 Favorite Song</button>
        <div id="songBox" class="hidden">
            <p>Raindance</p>
            <audio id="song" src="raindance.mp3"></audio>
            <button onclick="playPause()">Play / Pause</button>
        </div>

        <button class="pink-btn" onclick="toggleQuotes()">💗 Quotes</button>
        <div id="quotesBox" class="hidden">
            <p><i>"Tetap rendah hati dan terus belajar."</i></p>
        </div>

    </div>

</section>

</section>

<script src="script.js"></script>
</body>
</html>
